spring:
  application:
    name: hospital-management-system
  
  # Configuration H2 pour développement
  datasource:
    url: jdbc:h2:mem:hospital_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    
  security:
    user:
      name: ${ADMIN_USER:admin}
      password: ${ADMIN_PASSWORD:Admin123!}
      roles: ADMIN
      
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    com.hospital: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      
# Configuration JWT
jwt:
  secret: ${JWT_SECRET:hospitalSecretKey2024ForAuthenticationAndAuthorization}
  expiration: 86400000 # 24 heures en millisecondes
  refresh-expiration: 604800000 # 7 jours en millisecondes
  
# Configuration des fichiers
file:
  upload:
    path: ${UPLOAD_PATH:./uploads}
    max-size: 10MB
    allowed-types: pdf,doc,docx,jpg,jpeg,png,gif
    
# Configuration des rapports
reports:
  output-path: ${REPORTS_PATH:./reports}
  
# Configuration de la pagination
pagination:
  default-page-size: 20
  max-page-size: 100